name: Build Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true   # ← YEH LINE ADD KARO
      
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon  # ← --no-daemon ADD KARO
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KasariChauhan-Update
          path: app/build/outputs/apk/debug/app-debug.apk
